name: Puzzel Release Notes Watcher

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python check_puzzel.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit last seen state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_seen_article.json
          git diff --staged --quiet || git commit -m "chore: update last seen article"
          git push
